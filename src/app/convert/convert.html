<h1>Konvertering</h1>
<div id="inputDiv">
    <label for="inputC">Från Celsius till Farenheit</label>
    <input type="number" id="inputC" [(ngModel)]="inputC">
    <!--knyter till modell, får 2vägs databinding (importerat FormsModule i ts)-->
    <button (click)="farenheit()">Celsius till farenheit</button>
     <p>Resultat: {{ result1 }}</p>
</div>

<div>
    <label for="inputF">Från Farenheit till Celsius</label>
    <input type="number" id="inputF" [(ngModel)]="inputF">
    <button (click)="celsius()">Farenheit till Celsius</button>
     <p>Resultat: {{ result2 }}</p>
</div>

<div>
    <label for="inputMet">Från Meter till Feet</label>
    <input type="number" id="inputMet" [(ngModel)]="inputMet">
    <button (click)="feet()">Meter till feet</button>
     <p>Resultat: {{ result3 }}</p>
</div>

<div>
    <label for="inputFeet">Från Feet till Meter</label>
    <input type="number" id="inputFeet" [(ngModel)]="inputFeet">
    <button (click)="meter()">Feet till Meter</button>
     <p>Resultat: {{ result4 }}</p>
</div>
